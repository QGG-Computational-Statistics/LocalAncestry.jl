name: Sync Personal to Organization
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'BgroveP/LocalAncestry.jl'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.QGG_PAT }}

      - name: Configure Git
        run: |
          git config --global user.email "bjarke.poulsen@pm.me"
          git config --global user.name "BgroveP"

      - name: Add organization repository as remote
        run: |
          git remote add org https://x-access-token:${{ secrets.QGG_PAT }}@github.com/QGG-Computational-Genomics/LocalAncestry.jl.git

      - name: Mirror everything to organization
        run: |
          git push --mirror org
