name: Sync Personal to Organization
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "bjarke.poulsen@pm.me"
          git config --global user.name "BgroveP"

      - name: Add organization repository as remote with PAT
        run: |
          git remote add org https://x-access-token:${{ secrets.QGG_PAT }}@github.com/QGG-Computational-Statistics/LocalAncestry.jl.git

      - name: Fetch and merge changes from organization
        run: |
          git fetch org
          git checkout main
          git merge org/main --no-edit -X theirs || true  # Continue even if merge fails

      - name: Push changes to organization repository
        run: |
          git push https://x-access-token:${{ secrets.QGG_PAT }}@github.com/QGG-Computational-Statistics/LocalAncestry.jl.git main
